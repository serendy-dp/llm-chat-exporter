<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 16px;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background: #0a0e1a;
      color: #c0d8ff;
      position: relative;
      overflow: hidden;
    }

    /* グリッド背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }

    /* スキャンライン */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    * { position: relative; z-index: 1; }

    /* タイトル */
    .title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .title-bracket {
      color: #00e5ff;
      font-size: 16px;
      opacity: 0.7;
    }

    h2 {
      font-size: 13px;
      font-weight: 400;
      color: #00e5ff;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0,229,255,0.6);
    }

    /* サービスインジケーター */
    #serviceIndicator {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 2px;
      margin-bottom: 14px;
      display: inline-block;
      letter-spacing: 0.1em;
      border: 1px solid currentColor;
    }
    #serviceIndicator.claude   { color: #60a5fa; border-color: #60a5fa44; background: #60a5fa11; text-shadow: 0 0 6px #60a5fa88; }
    #serviceIndicator.chatgpt  { color: #4ade80; border-color: #4ade8044; background: #4ade8011; text-shadow: 0 0 6px #4ade8088; }
    #serviceIndicator.gemini   { color: #a78bfa; border-color: #a78bfa44; background: #a78bfa11; text-shadow: 0 0 6px #a78bfa88; }
    #serviceIndicator.none     { color: #f87171; border-color: #f8717144; background: #f8717111; }
    #serviceIndicator.checking { color: #888;    border-color: #33333388; background: transparent; }

    /* フォーマット選択 */
    .format-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .fmt-label {
      font-size: 9px;
      color: #557799;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .fmt-btn {
      flex: 1;
      padding: 6px 0;
      background: transparent;
      border: 1px solid #1a3a55;
      border-radius: 2px;
      color: #557799;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .fmt-btn.active {
      border-color: #00e5ff;
      color: #00e5ff;
      background: #00e5ff11;
      text-shadow: 0 0 6px rgba(0,229,255,0.5);
    }

    .fmt-btn:hover:not(.active) {
      border-color: #2a5a7a;
      color: #7ab0cc;
    }

    .range-input {
      width: 100%;
      padding: 6px 8px;
      background: transparent;
      border: 1px solid #1a3a55;
      border-radius: 2px;
      color: #00e5ff;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.08em;
      outline: none;
      display: none;
      min-width: 0;
      margin-top: 6px;
      margin-bottom: 2px;
    }
    .range-input.visible { display: block; }
    .range-input::placeholder { color: #335577; }
    .range-input:focus { border-color: #00e5ff; }

    /* date picker のカラーを上書き */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) saturate(3) hue-rotate(170deg);
      cursor: pointer;
    }

    /* アクションボタン */
    .btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 7px;
      transition: all 0.15s;
      text-align: left;
    }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #btnExport {
      background: #0a1f3a;
      border: 1px solid #00e5ff66;
      color: #00e5ff;
      text-shadow: 0 0 6px rgba(0,229,255,0.4);
    }
    #btnExport:not(:disabled):hover {
      background: #0d2a4d;
      border-color: #00e5ff;
      box-shadow: 0 0 10px rgba(0,229,255,0.2), inset 0 0 10px rgba(0,229,255,0.05);
    }

    #btnSync {
      background: #0a2a1a;
      border: 1px solid #00ff8866;
      color: #00ff88;
      text-shadow: 0 0 6px rgba(0,255,136,0.4);
    }
    #btnSync:not(:disabled):hover {
      background: #0d3a22;
      border-color: #00ff88;
      box-shadow: 0 0 10px rgba(0,255,136,0.2), inset 0 0 10px rgba(0,255,136,0.05);
    }

    #btnStop {
      display: none;
      width: 100%;
      padding: 9px 12px;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 7px;
      text-align: left;
      background: #2a0a0a;
      border: 1px solid #ff446666;
      color: #ff4466;
      text-shadow: 0 0 6px rgba(255,68,102,0.4);
      transition: all 0.15s;
    }
    #btnStop:hover {
      background: #3a0d0d;
      border-color: #ff4466;
      box-shadow: 0 0 10px rgba(255,68,102,0.2), inset 0 0 10px rgba(255,68,102,0.05);
    }
    #btnStop.visible { display: block; }

    /* ボタンプレフィックス */
    .btn-prefix {
      color: #335577;
      margin-right: 6px;
    }
    #btnExport .btn-prefix { color: #00a0bb; }
    #btnSync   .btn-prefix { color: #00aa55; }

    /* コンフィグトグル */
    #btnConfig {
      background: transparent;
      border: 1px solid #1a3344;
      border-radius: 2px;
      color: #335577;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 4px 8px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
    }
    #btnConfig:hover, #btnConfig.open {
      border-color: #00e5ff55;
      color: #00e5ff99;
    }

    /* 設定パネル */
    #configPanel {
      display: none;
      border: 1px solid #0d2a3a;
      border-radius: 2px;
      padding: 10px;
      margin-bottom: 10px;
      background: #060c14;
    }
    #configPanel.open { display: block; }

    .cfg-row {
      margin-bottom: 10px;
    }
    .cfg-row:last-child { margin-bottom: 0; }

    .cfg-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .cfg-name {
      font-size: 9px;
      color: #00e5ffaa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .cfg-rec {
      font-size: 8px;
      color: #335566;
      letter-spacing: 0.05em;
    }

    .cfg-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cfg-input {
      width: 64px;
      padding: 4px 6px;
      background: #0a1a28;
      border: 1px solid #1a3a55;
      border-radius: 2px;
      color: #00e5ff;
      font-family: inherit;
      font-size: 11px;
      outline: none;
      text-align: right;
    }
    .cfg-input:focus { border-color: #00e5ff; }
    .cfg-unit {
      font-size: 9px;
      color: #335566;
    }
    .cfg-warn {
      font-size: 8px;
      color: #ff6644;
      margin-top: 3px;
      display: none;
      letter-spacing: 0.04em;
    }
    .cfg-warn.visible { display: block; }

    /* トグルスイッチ (Auto Sync) */
    .latent-toggle {
      position: relative;
      display: inline-block;
      width: 28px;
      height: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .latent-toggle input { display: none; }
    .latent-track {
      position: absolute;
      inset: 0;
      background: #0d1a2a;
      border: 1px solid #1a3a55;
      border-radius: 7px;
      transition: all 0.2s;
    }
    .latent-toggle input:checked + .latent-track {
      border-color: #00ff88;
      background: #00ff8822;
    }
    .latent-track::after {
      content: '';
      position: absolute;
      left: 1px;
      top: 1px;
      width: 10px;
      height: 10px;
      background: #335577;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .latent-toggle input:checked + .latent-track::after {
      left: 15px;
      background: #00ff88;
      box-shadow: 0 0 4px #00ff8888;
    }

    /* ノート */
    #note {
      font-size: 9px;
      color: #334455;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      border-left: 2px solid #1a3344;
      padding-left: 6px;
    }

    /* プログレス */
    #progressWrap {
      width: 100%;
      height: 2px;
      background: #0d1a2a;
      border-radius: 0;
      margin-bottom: 8px;
      display: none;
      position: relative;
    }

    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, #0066aa, #00e5ff);
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(0,229,255,0.6);
    }

    /* ステータス */
    #status {
      font-size: 10px;
      color: #334466;
      min-height: 14px;
      line-height: 1.5;
      word-break: break-all;
      letter-spacing: 0.05em;
    }
    #status::before { content: '> '; color: #1a3a55; }
    #status.error { color: #ff4466; text-shadow: 0 0 6px rgba(255,68,102,0.4); }
    #status.error::before { color: #882233; }
    #status.done  { color: #00ff88; text-shadow: 0 0 6px rgba(0,255,136,0.4); }
    #status.done::before  { color: #006633; }
  </style>
</head>
<body>
  <div class="title-wrap">
    <span class="title-bracket">[</span>
    <h2>LLM Chat Exporter</h2>
    <span class="title-bracket">]</span>
  </div>

  <div id="serviceIndicator" class="checking">// 検出中...</div>

  <div class="fmt-label">// format</div>
  <div class="format-row">
    <button class="fmt-btn active" id="fmtJson">JSON</button>
    <button class="fmt-btn" id="fmtMd">Markdown</button>
  </div>

  <div class="fmt-label">// range</div>
  <div class="format-row">
    <button class="fmt-btn active" id="limitAll">ALL</button>
    <button class="fmt-btn" id="limitN">LATEST</button>
    <button class="fmt-btn" id="limitSince">SINCE</button>
  </div>
  <input type="number" class="range-input" id="limitInput" min="1" placeholder="件数を入力" />
  <input type="date"   class="range-input" id="sinceInput" />

  <button class="btn" id="btnExport"><span class="btn-prefix">&gt;</span> Export</button>
  <button class="btn" id="btnSync"><span class="btn-prefix">&gt;</span> Sync DB</button>
  <button id="btnStop"><span class="btn-prefix">&gt;</span> Stop</button>

  <button id="btnConfig">⚙ CONFIG</button>

  <div id="configPanel">
    <div class="cfg-row">
      <div class="cfg-label">
        <span class="cfg-name">Concurrency</span>
        <span class="cfg-rec">推奨: 1–3</span>
      </div>
      <div class="cfg-input-wrap">
        <input class="cfg-input" type="number" id="cfgConcurrency" min="1" max="20" value="2" />
        <span class="cfg-unit">並列</span>
      </div>
      <div class="cfg-warn" id="warnConcurrency">⚠ 4以上は 429 rate limit が発生しやすくなります</div>
    </div>

    <div class="cfg-row">
      <div class="cfg-label">
        <span class="cfg-name">Chunk Delay</span>
        <span class="cfg-rec">推奨: 1000–3000 ms</span>
      </div>
      <div class="cfg-input-wrap">
        <input class="cfg-input" type="number" id="cfgChunkDelay" min="0" max="30000" step="100" value="2000" />
        <span class="cfg-unit">ms</span>
      </div>
      <div class="cfg-warn" id="warnChunkDelay">⚠ 500ms未満は rate limit が発生しやすくなります</div>
    </div>

    <div class="cfg-row">
      <div class="cfg-label">
        <span class="cfg-name">Auto Sync</span>
        <label class="latent-toggle">
          <input type="checkbox" id="latentEnabled" />
          <span class="latent-track"></span>
        </label>
      </div>
      <div id="latentIntervalWrap" style="display:none; margin-top:6px">
        <div class="cfg-input-wrap">
          <input class="cfg-input" type="number" id="latentInterval" min="1" max="1440" value="30" />
          <span class="cfg-unit">min / cycle</span>
        </div>
      </div>
    </div>
  </div>

  <div id="note">$ uvicorn server:app --port 8765</div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
